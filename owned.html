let ownedPokemon=[];

  function getTypeEmoji(type){

switch(type){

case "Fire": return "🔥";
case "Water": return "💧";
case "Grass": return "🌿";
case "Electric": return "⚡";
case "Ice": return "❄️";
case "Fighting": return "🥊";
case "Poison": return "☠️";
case "Ground": return "🌎";
case "Flying": return "🪽";
case "Psychic": return "🔮";
case "Bug": return "🐛";
case "Rock": return "🪨";
case "Ghost": return "👻";
case "Dragon": return "🐉";
case "Dark": return "🌑";
case "Steel": return "⚙️";
case "Fairy": return "🧚";
case "Normal": return "⭐";

default: return "";

}

}
function typeEmoji(type){

const map = {
Fire:"🔥",
Water:"💧",
Grass:"🌿",
Electric:"⚡",
Dragon:"🐉",
Steel:"⚙️",
Psychic:"🧠",
Dark:"🌑",
Fairy:"🧚",
Rock:"🪨",
Ground:"🌎",
Ice:"❄️",
Flying:"🕊️",
Ghost:"👻",
Bug:"🐛",
Poison:"☠️",
Normal:"⚪",
Fighting:"👊"
};

return map[type] || "❔";

}
init();

async function init(){

    await Promise.all([
        loadOwnedPokemon(),
        loadMoves(),
        loadTagConfigs()
    ]);

    renderCards();

    document
    .getElementById("search")
    .addEventListener("input",renderCards);

    document

    document

document
.getElementById("moveFilter")

// --------------------
// LOAD OWNED POKEMON
// --------------------

async function loadOwnedPokemon(){

    const {data,error}=await db

    .from("user_collection")

    .select(`
pokemon_id,
pokemon_master(
id,
tag_code,
pokemon_name,
version,
rarity,
image_url,
move_id,
mezastar_moves(
id,
move_name,
move_type
)
)
`)

    .eq("user_id",Number(userId))
    .eq("owned",true);

    if(error){

        console.log(error);

        return;

    }

    ownedPokemon=data.map(x=>x.pokemon_master);

}

// --------------------
// LOAD MOVES
// --------------------

async function loadMoves(){

    const {data,error}=await db

    .from("mezastar_moves")

    .select("*")

    .order("move_name");

    if(error){

        console.log(error);

        return;

    }

    moves=data;

}

// --------------------
// LOAD CONFIGS
// --------------------

async function loadTagConfigs(){

    const {data,error}=await db

    .from("user_tag_config")

    .select("*")

    .eq("user_id",Number(userId));

    if(error){

        console.log(error);

        return;

    }

    tagConfigs=data;

}
function updateSummary(){

const total = ownedPokemon.length;

const assigned =
ownedPokemon.filter(p=>p.move_id).length;

const missing =
total-assigned;

const percent =
total
?
Math.round((assigned/total)*100)
:
0;

document.getElementById("assignedCount").innerHTML =
assigned;

document.getElementById("missingCount").innerHTML =
missing;

document.getElementById("completionPercent").innerHTML =
percent+"%";

}
// --------------------
// RENDER CARDS
// --------------------

function renderCards(){

    const search=document
    .getElementById("search")
    .value
    .toLowerCase();

    const version=document
    .getElementById("versionFilter")
    .value;

    const rarity=document
    .getElementById("rarityFilter")
    .value;
const moveFilter=document
.getElementById("moveFilter")
.value;
  updateSummary();
    let list=[...ownedPokemon];

    if(search){

        list=list.filter(p=>

            p.pokemon_name
            .toLowerCase()
            .includes(search)

            ||

            (p.tag_code||"")
            .toLowerCase()
            .includes(search)

        );

    }

    if(version!="All"){

        list=list.filter(p=>String(p.version)==version);

    }

    if(rarity!="All"){

        list=list.filter(p=>String(p.rarity)==rarity);

    }
if(moveFilter=="missing"){

list=list.filter(p=>!p.move_id);

}

if(moveFilter=="assigned"){

list=list.filter(p=>p.move_id);

}
    list.sort((a,b)=>{

        if(b.rarity!==a.rarity)
        return b.rarity-a.rarity;

        return a.pokemon_name.localeCompare(b.pokemon_name);

    });

    const container=document.getElementById("cards");

    if(list.length===0){

        container.innerHTML=`
        <div class="empty">
        No owned Pokémon found.
        </div>
        `;

        return;

    }

    let html="";

    list.forEach(p=>{

        const config =
tagConfigs.find(x=>x.pokemon_id===p.id);

const moveId = Number(p.move_id);
        html+=`

        <div class="card">

            <div class="image">

                ${
                p.image_url
                ?
                `<img src="${p.image_url}">`
                :
                ""
                }

            </div>

            <div class="name">

                ${p.pokemon_name}

            </div>

            <div class="tag">

                ${p.tag_code||""}

            </div>

           <div class="version">

${{
1:"V1",
2:"V2",
3:"V3",
4:"🌌 Galaxy",
5:"🎁 Promo"
}[p.version]}

•

${"⭐".repeat(p.rarity)}

</div>

            <label>

                Move

            </label>

           <select
class="moveSelect"
onchange="moveChanged(${p.id})"
id="move-${p.id}">

              <option value="">
Not Assigned
</option>
${moves.map(m=>`

<option
value="${m.id}"
${moveId == m.id ? "selected" : ""}>

${m.move_name} ${getTypeEmoji(m.move_type)}

</option>

`).join("")}

<option value="new">
➕ Add New Move
</option>
<option value="manage">
⚙️ Manage Moves
</option>
            </select>

            <label>

                Notes

            </label>

            <textarea

                id="notes-${p.id}"

                onblur="saveConfig(${p.id})"

            >${config?.notes||""}</textarea>

            <div

                class="status"

                id="status-${p.id}"

            ></div>

        </div>

        `;

    });

    container.innerHTML=html;

}

async function moveChanged(pokemonId){

const value =
document.getElementById(`move-${pokemonId}`).value;

if(value==="new"){

openMoveModal(pokemonId);

return;

}

if(value==="manage"){

openManageMoves();

document.getElementById(`move-${pokemonId}`).value =
ownedPokemon.find(x=>x.id===pokemonId)?.move_id || "";

return;

}

saveConfig(pokemonId);

}

currentPokemonId=pokemonId;

${

`

</div>

`

:

`<div style="
margin-top:8px;

color:#64748b;
">

</div>`

}

</div>

<div style="
display:flex;
gap:8px;
">

<button
onclick="editMove(${m.id})">

✏️ Edit

</button>

<button
style="background:#dc2626;"
onclick="deleteMove(${m.id})">

🗑 Delete

</button>

</div>

</div>

`;

}).join("");

}
  function editMove(id){

const move =
moves.find(m=>m.id===id);

editingMoveId=id;
    currentPokemonId=null;


document.getElementById("moveModalTitle").innerHTML =
"Edit Mezastar Move";

document.getElementById("newMoveName").value =
move.move_name;

document.getElementById("newMoveType").value =
move.move_type;

closeManageMoves();

document.getElementById("moveModal").style.display="flex";

}
  async function deleteMove(moveId){

const usedBy = ownedPokemon.filter(p=>p.move_id==moveId);

if(usedBy.length){

alert(
`Cannot delete this move.\n\nIt is currently used by ${usedBy.length} Pokémon.`
);

return;

}

const move =
moves.find(m=>m.id==moveId);

if(!confirm(`Delete "${move.move_name}"?`)){

return;

}

const {error}=await db

.from("mezastar_moves")

.delete()

.eq("id",moveId);

if(error){

alert(error.message);

return;

}

await loadMoves();

renderManageMoves();

renderCards();

}
  
  async function saveNewMove(){
console.log("saveNewMove called");
const name =
document.getElementById("newMoveName").value.trim();

const type =
document.getElementById("newMoveType").value;

if(name===""){

alert("Enter a move name.");

return;

}

// Check if move already exists
const existing =
moves.find(m=>

m.move_name.toLowerCase()===name.toLowerCase()

&&

m.id!==editingMoveId

);
let moveId;

if(editingMoveId){

const {error}=await db

.from("mezastar_moves")

.update({

move_name:name,

move_type:type

})

.eq("id",editingMoveId);

if(error){

alert(error.message);

return;

}

editingMoveId=null;

await loadMoves();

await loadOwnedPokemon();

renderCards();

closeMoveModal();

return;

}

if(existing){

moveId = existing.id;

}else{

const {data,error}=await db

.from("mezastar_moves")

.insert({

move_name:name,

move_type:type

})

.select()

.single();
  console.log("DATA:", data);
console.log("ERROR:", error);

if(error){

console.error(error);

alert(JSON.stringify(error,null,2));

return;

}

moveId=data.id;
}

  // Reload moves
await loadMoves();

// Save the selected move globally
const { error: updateError } = await db

.from("pokemon_master")

.update({

    move_id: moveId

})

.eq("id", currentPokemonId);
if(updateError){

    console.error(updateError);

    alert("Failed to assign the move to this Pokémon.");

    return;

}
// Reload owned Pokémon
await Promise.all([
    loadOwnedPokemon(),
    loadTagConfigs(),
    loadMoves()
]);

// Close modal
closeMoveModal();

// Refresh screen
renderCards();

}
async function saveConfig(pokemonId){

    const move=document
    .getElementById(`move-${pokemonId}`)
    .value;

    const notes=document
    .getElementById(`notes-${pokemonId}`)
    .value;

    const status=document
    .getElementById(`status-${pokemonId}`);

    status.innerHTML="💾 Saving...";

   const {error:moveError}=await db

.from("pokemon_master")

.update({

move_id: move ? Number(move) : null

})

.eq("id",pokemonId);
  const {error:notesError}=await db

.from("user_tag_config")

.upsert({

user_id:Number(userId),

pokemon_id:pokemonId,

notes:notes

},{
onConflict:"user_id,pokemon_id"
});

    // <<<<<< THIS IS WHERE IT GOES >>>>>>
    if(moveError || notesError){

        console.error(moveError || notesError);

        alert("Save failed.");

        status.innerHTML = "❌ Failed";

        return;

    }

    // Refresh data
  await Promise.all([
    loadOwnedPokemon(),
    loadTagConfigs()
]);

renderCards();

    status.innerHTML = "✅ Saved";

    setTimeout(()=>{

        status.innerHTML="";

    },2000);

}
