<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mezastar Trade Center</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#0b1320;
    color:#fff;
    min-height:100vh;
}

header{
    background:#13233d;
    padding:18px 24px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:12px;
    box-shadow:0 2px 12px rgba(0,0,0,.35);
}

header h2{
    font-size:24px;
    color:#ffd54f;
}

header div{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

header button{
    background:#1976d2;
    border:none;
    color:white;
    padding:10px 18px;
    border-radius:8px;
    cursor:pointer;
    transition:.2s;
    font-weight:bold;
}

header button:hover{
    background:#1565c0;
}

.container{
    width:min(1400px,95%);
    margin:25px auto;
}

.summary{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:18px;
    margin-bottom:25px;
}

.summaryCard{
    background:#162844;
    border-radius:14px;
    padding:20px;
    box-shadow:0 6px 18px rgba(0,0,0,.25);
    transition:.25s;
}

.summaryCard:hover{
    transform:translateY(-4px);
}

.summaryTitle{
    color:#b9c6d8;
    font-size:14px;
    margin-bottom:8px;
}

.summaryValue{
    font-size:34px;
    font-weight:bold;
}

.summaryMissing{
    color:#ff6b6b;
}

.summaryAssigned{
    color:#51cf66;
}

.summaryPercent{
    color:#ffd43b;
}

.tradeForm,
.tradeHistory{
    background:#162844;
    border-radius:14px;
    padding:25px;
    margin-bottom:25px;
    box-shadow:0 6px 18px rgba(0,0,0,.25);
}

.tradeForm h2,
.tradeHistory h2{
    margin-bottom:20px;
    color:#ffd54f;
}

.formGrid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:18px;
}

label{
    display:block;
    margin-bottom:6px;
    font-weight:bold;
}

input,
select,
textarea{
    width:100%;
    padding:11px;
    border-radius:8px;
    border:none;
    outline:none;
    background:#22395f;
    color:white;
}

input::placeholder,
textarea::placeholder{
    color:#b7bfd0;
}

textarea{
    resize:vertical;
}

.checkboxRow{
    display:flex;
    align-items:center;
    gap:10px;
    margin-top:20px;
}

.checkboxRow input{
    width:auto;
}

.buttonRow{
    margin-top:20px;
}

.buttonRow button{
    background:#2e7d32;
    color:white;
    border:none;
    padding:12px 24px;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
    transition:.2s;
}

.buttonRow button:hover{
    background:#1b5e20;
}

/* CSS continues in Part 2... */

.historyToolbar{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    margin-bottom:20px;
}

.historyToolbar input{
    flex:1;
    min-width:250px;
}

.historyToolbar select{
    width:200px;
}

#historyCards{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
    gap:18px;
}

.tradeCard{
    background:#22395f;
    border-radius:12px;
    padding:18px;
    border-left:6px solid #1976d2;
    transition:.25s;
}

.tradeCard.traded{
    border-left-color:#ef5350;
}

.tradeCard.received{
    border-left-color:#43a047;
}

.tradeCard:hover{
    transform:translateY(-4px);
}

.tradeCard h3{
    margin-bottom:12px;
    color:#ffd54f;
}

.tradeCard .row{
    margin:6px 0;
    color:#d7e3f4;
}

.tradeActions{
    display:flex;
    gap:10px;
    margin-top:18px;
}

.tradeActions button{
    flex:1;
    padding:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.editBtn{
    background:#1976d2;
    color:white;
}

.deleteBtn{
    background:#d32f2f;
    color:white;
}

.empty{
    text-align:center;
    padding:50px;
    color:#b8c5d6;
    font-size:18px;
}

@media(max-width:768px){

header{
    flex-direction:column;
    align-items:flex-start;
}

header div{
    width:100%;
}

header button{
    flex:1;
}

.historyToolbar{
    flex-direction:column;
}

.historyToolbar select{
    width:100%;
}

}

</style>

</head>
    <body>

<header>

    <h2>🔄 Trade Center</h2>

    <div>

        <button onclick="location.href='dashboard.html'">
            🏠 Home
        </button>

        <button onclick="location.href='collection.html'">
            📖 Collection
        </button>

        <button onclick="location.href='owned.html'">
           Movesets
        </button>

        <button onclick="location.href='battle.html'">
            ⚔ Battle Helper
        </button>

    </div>

</header>

<div class="container">

    <!-- ===================================== -->
    <!-- SUMMARY -->
    <!-- ===================================== -->

    <div class="summary">

        <div class="summaryCard">

            <div class="summaryTitle">
                Total Trades
            </div>

            <div class="summaryValue" id="totalTrades">
                0
            </div>

        </div>

        <div class="summaryCard">

            <div class="summaryTitle">
                Pokémon Traded
            </div>

            <div class="summaryValue summaryMissing" id="totalTraded">
                0
            </div>

        </div>

        <div class="summaryCard">

            <div class="summaryTitle">
                Pokémon Received
            </div>

            <div class="summaryValue summaryAssigned" id="totalReceived">
                0
            </div>

        </div>

        <div class="summaryCard">

            <div class="summaryTitle">
                Trade Partners
            </div>

            <div class="summaryValue summaryPercent" id="totalPartners">
                0
            </div>

        </div>

    </div>

    <!-- ===================================== -->
    <!-- NEW TRADE -->
    <!-- ===================================== -->

    <div class="tradeForm">

        <h2>➕ New Trade</h2>

        <div class="formGrid">

            <div>

                <label>Trade Type</label>

                <select id="tradeType">

                    <option value="traded">📤 Traded</option>

                    <option value="received">📥 Received</option>

                </select>

            </div>

            <div>

                <label>Pokémon</label>

                <select id="pokemonSelect">

                    <option value="">Loading Pokémon...</option>

                </select>

            </div>

            <div>

                <label>Quantity</label>

                <input
                    id="quantity"
                    type="number"
                    value="1"
                    min="1">

            </div>

            <div>

                <label>Person</label>

                <input
                    id="person"
                    type="text"
                    placeholder="Trader name">

            </div>

            <div>

                <label>Received In Return</label>

                <input
                    id="receivedItem"
                    type="text"
                    placeholder="Rayquaza / ₱500 / Gift">

            </div>

            <div>

                <label>Trade Date</label>

                <input
                    id="tradeDate"
                    type="date">

            </div>

        </div>

        <input
            type="hidden"
            id="editingTradeId">

        <label style="margin-top:20px;">
            Notes
        </label>

        <textarea
            id="notes"
            rows="4"
            placeholder="Optional notes..."></textarea>

        <div class="checkboxRow">

            <input
                type="checkbox"
                id="updateCollection"
                checked>

            <label for="updateCollection">

                Automatically update my collection

            </label>

        </div>

        <div class="buttonRow">

            <button onclick="saveTrade()">

                💾 Save Trade

            </button>

        </div>

    </div>

    <!-- ===================================== -->
    <!-- TRADE HISTORY -->
    <!-- ===================================== -->

    <div class="tradeHistory">

        <h2>📜 Trade History</h2>

        <div class="historyToolbar">

            <input
                id="historySearch"
                type="text"
                placeholder="🔍 Search...">

            <select id="historyFilter">

                <option value="all">
                    All Trades
                </option>

                <option value="traded">
                    📤 Traded
                </option>

                <option value="received">
                    📥 Received
                </option>

            </select>

            <select id="historySort">

                <option value="newest">
                    Newest First
                </option>

                <option value="oldest">
                    Oldest First
                </option>

            </select>

        </div>

        <div id="historyCards">

            <div class="empty">

                📦 No trades yet.

            </div>

        </div>
    </div> <!-- tradeHistory -->

</div> <!-- container -->
    <script>

const db = supabase.createClient(

'https://dzbpzlkpjbascrjozcih.supabase.co',

'sb_publishable_AXT6yLPWDsSJ43uf14KMIQ_tlEoOt4r'

);

const userId = Number(localStorage.getItem("user_id"));

if(!userId){

    location.href = "index.html";

}

let pokemonList = [];
let tradeHistory = [];
init();

async function init(){

    document.getElementById("tradeDate").value =
        new Date().toISOString().split("T")[0];

    await Promise.all([

        loadPokemon(),

        loadTradeHistory()

    ]);

    updateSummary();
       document
.getElementById("historySearch")
.addEventListener("input",renderHistory);

document
.getElementById("historyFilter")
.addEventListener("change",renderHistory);

document
.getElementById("historySort")
.addEventListener("change",renderHistory);


}
async function loadPokemon(){

const { data, error } = await db
        .from("pokemon_master")

    .select(`
    id,
    pokemon_name,
    rarity,
    tag_code,
    version_name
`)
      .order("version_name")
.order("tag_code");

    if(error){

        console.error(error);

        return;

    }

    pokemonList = data;

   const select =
    document.getElementById("pokemonSelect");

select.innerHTML =
`<option value="">Select Pokémon...</option>`;

const grouped = {};

data.forEach(pokemon=>{

    const version =
        pokemon.version_name || "Other";

    if(!grouped[version]){

        grouped[version] = [];

    }

    grouped[version].push(pokemon);

});

Object.keys(grouped)
.sort((a,b)=>{

    const na = parseInt(a.replace(/\D/g,"")) || 0;
    const nb = parseInt(b.replace(/\D/g,"")) || 0;

    return nb - na;

})
.forEach(version=>{

    const optgroup =
        document.createElement("optgroup");

optgroup.label =
    `${version} (${grouped[version].length})`;
    grouped[version].forEach(pokemon=>{

        const stars =
            "★".repeat(pokemon.rarity || 0);

        const option =
            document.createElement("option");

        option.value = pokemon.id;

        option.textContent =
            `${pokemon.tag_code} • ${pokemon.pokemon_name} ${stars}`;

        optgroup.appendChild(option);

    });

    select.appendChild(optgroup);

});

}

async function loadTradeHistory(){

const { data, error } = await db
        .from("trade_history")

        .select("*")

        .eq("user_id", userId)

        .order("trade_date",{ascending:false});

    if(error){

        console.error(error);

        return;

    }

    tradeHistory = data;

    renderHistory();

}

function updateSummary(){

    document.getElementById("totalTrades").textContent =
        tradeHistory.length;

    document.getElementById("totalTraded").textContent =
        tradeHistory.filter(x=>x.trade_type==="traded").length;

    document.getElementById("totalReceived").textContent =
        tradeHistory.filter(x=>x.trade_type==="received").length;

    const partners =
        [...new Set(
            tradeHistory.map(x=>x.person_name)
        )];

    document.getElementById("totalPartners").textContent =
        partners.length;

}

function renderHistory(){

    const history =
        document.getElementById("historyCards");

    if(!tradeHistory.length){

        history.innerHTML = `
        <div class="empty">

            📦 No trades yet.

        </div>
        `;

        return;

    }

    let list = [...tradeHistory];

    const search =
        document.getElementById("historySearch").value.toLowerCase();

    const filter =
        document.getElementById("historyFilter").value;

    const sort =
        document.getElementById("historySort").value;

    if(search){

        list = list.filter(t=>{

            const pokemon =
                pokemonList.find(p=>p.id==t.pokemon_id);

       return (

    (pokemon?.pokemon_name || "")
        .toLowerCase()
        .includes(search)

    ||

    (pokemon?.tag_code || "")
        .toLowerCase()
        .includes(search)

    ||

    (pokemon?.version_name || "")
        .toLowerCase()
        .includes(search)

    ||

    (t.person_name || "")
        .toLowerCase()
        .includes(search)

    ||

    (t.received_item || "")
        .toLowerCase()
        .includes(search)

    ||

    (t.notes || "")
        .toLowerCase()
        .includes(search)

);
        });

    }

    if(filter!="all"){

        list =
            list.filter(t=>t.trade_type===filter);

    }

    if(sort==="oldest"){

        list.reverse();

    }

    history.innerHTML = "";

    list.forEach(trade=>{

        const pokemon =
            pokemonList.find(p=>p.id==trade.pokemon_id);

        history.innerHTML += `

        <div class="tradeCard ${trade.trade_type}">
<h3>

    ${trade.trade_type=="traded"
        ? "📤 Traded"
        : "📥 Received"}

    ×${trade.quantity}

</h3>

            <div class="row">

                <b>Pokémon:</b>

                ${pokemon?.pokemon_name || "Unknown"}

            </div>
<div class="row">

    <b>Rarity:</b>

    ${"★".repeat(pokemon?.rarity || 0)}

</div>

            
<div class="row">

    <b>Version:</b>

    ${pokemon?.version_name || "-"}

</div>
            <div class="row">

                <b>Tag:</b>

                ${pokemon?.tag_code || "-"}

            </div>

        

            <div class="row">

                <b>Person:</b>

                ${trade.person_name || "-"}

            </div>

            <div class="row">

                <b>Received:</b>

                ${trade.received_item || "-"}

            </div>

            <div class="row">

                <b>Date:</b>

                ${trade.trade_date}

            </div>
            ${trade.notes ? `

<div class="row">

    <b>Notes:</b>

    ${trade.notes}

</div>

` : ""}

            <div class="tradeActions">

                <button
                    class="editBtn"
                    onclick="editTrade(${trade.id})">

                    ✏ Edit

                </button>

                <button
                    class="deleteBtn"
                    onclick="deleteTrade(${trade.id})">

                    🗑 Delete

                </button>

            </div>

        </div>

        `;

    });

}
        async function saveTrade(){

    const editingId =
        document.getElementById("editingTradeId").value;

    const trade = {

        user_id: userId,

        pokemon_id: Number(
            document.getElementById("pokemonSelect").value
        ),

        trade_type:
            document.getElementById("tradeType").value,

        quantity:
            Number(
                document.getElementById("quantity").value
            ),

        person_name:
            document.getElementById("person").value.trim(),

        received_item:
            document.getElementById("receivedItem").value.trim(),

        trade_date:
            document.getElementById("tradeDate").value,

        notes:
            document.getElementById("notes").value.trim()

    };

    if(!trade.pokemon_id){

        alert("Please select a Pokémon.");

        return;

    }

    let error;

    if(editingId){

        ({ error } = await db

            .from("trade_history")

            .update(trade)

            .eq("id", editingId)

        );

    }else{

        ({ error } = await db

            .from("trade_history")

            .insert(trade)

        );

    }

    if(error){

        console.error(error);

        alert(error.message);

        return;

    }

await updateCollection(trade);

clearTradeForm();

await loadTradeHistory();

updateSummary();

         
}
        function clearTradeForm(){

    document.getElementById("editingTradeId").value = "";

    document.getElementById("tradeType").value = "traded";

    document.getElementById("pokemonSelect").selectedIndex = 0;

    document.getElementById("quantity").value = 1;

    document.getElementById("person").value = "";

    document.getElementById("receivedItem").value = "";

    document.getElementById("notes").value = "";

    document.getElementById("tradeDate").value =
        new Date().toISOString().split("T")[0];

}

async function editTrade(id){

    const trade =
        tradeHistory.find(t => t.id == id);

    if(!trade) return;

    document.getElementById("editingTradeId").value = trade.id;

    document.getElementById("tradeType").value = trade.trade_type;

    document.getElementById("pokemonSelect").value = trade.pokemon_id;

    document.getElementById("quantity").value = trade.quantity;

    document.getElementById("person").value = trade.person_name || "";

    document.getElementById("receivedItem").value = trade.received_item || "";

    document.getElementById("tradeDate").value = trade.trade_date;

    document.getElementById("notes").value = trade.notes || "";

    window.scrollTo({

        top: 0,

        behavior: "smooth"

    });

}
        async function deleteTrade(id){

    if(!confirm("Delete this trade?")){

        return;

    }

    const { error } = await db

        .from("trade_history")

        .delete()

        .eq("id", id);

    if(error){

        alert(error.message);

        return;

    }

    await loadTradeHistory();

    updateSummary();

}

      async function updateCollection(trade){

    const enabled =
        document.getElementById("updateCollection").checked;

    if(!enabled){

        return;

    }

    const { data: existing, error } = await db

        .from("user_collection")

        .select("*")

        .eq("user_id", userId)

        .eq("pokemon_id", trade.pokemon_id)

        .maybeSingle();

    if(error){

        console.error(error);

        return;

    }

  if(existing){

    let qty = Number(existing.quantity || 0);

    if(trade.trade_type === "received"){

        qty += Number(trade.quantity);

    }else{

        qty -= Number(trade.quantity);

        if(qty < 0){
            qty = 0;
        }

    }

    if(qty === 0){

        const { error } = await db
            .from("user_collection")
            .delete()
            .eq("id", existing.id);

        if(error){
            console.error(error);
        }

    }else{

        const { error } = await db
            .from("user_collection")
            .update({
                quantity: qty,
                owned: true
            })
            .eq("id", existing.id);

        if(error){
            console.error(error);
        }

    }

}else{

        if(trade.trade_type==="received"){

            await db

                .from("user_collection")

                .insert({

                    user_id: userId,

                    pokemon_id: trade.pokemon_id,

                    quantity: trade.quantity,

                    owned: true

                });

        }

    }

}  

</script>

</body>

</html>
