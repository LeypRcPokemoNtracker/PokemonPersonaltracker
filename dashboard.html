<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Personal Mezastar Tracker </title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f172a;
    color:white;
    font-family:Arial,sans-serif;
    min-height:100vh;
}

.header{
    background:#1e293b;
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:20px;
}

.card{
    background:#1e293b;
    border-radius:12px;
    padding:20px;
    margin-bottom:20px;
}

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.stat{
    background:#334155;
    padding:20px;
    border-radius:12px;
}

.big{
    font-size:32px;
    font-weight:bold;
    margin-top:10px;
}

button{
    border:none;
    border-radius:8px;
    padding:12px 20px;
    cursor:pointer;
    color:white;
}

.logout{
    background:#ef4444;
}

.collection{
    background:#3b82f6;
}

.battle{
    background:#22c55e;
}

.actions{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

</style>

</head>

<body>

<div class="header">

<h2>​𓆩(◣_◢)𓆪 Personal Mezastar Tracker</h2>

<button
    class="logout"
    onclick="logout()"
>
    Logout
</button>


</div>

<div class="container">

<div class="card">

    <h2 id="welcome">
        Welcome Trainer
    </h2>

</div>

<div class="stats">

    <div class="stat">
        <div>Total Pokémon</div>
        <div class="big" id="totalPokemon">
            0
        </div>
    </div>

    <div class="stat">
        <div>Collected</div>
        <div class="big" id="collectedPokemon">
            0
        </div>
    </div>

    <div class="stat">
        <div>Completion</div>
        <div class="big" id="completion">
            0%
        </div>
    </div>

</div>

<div class="card">

    <h3>Navigation</h3>

    <br>

    <div class="actions">

        <button
            class="collection"
            onclick="window.location.href='collection.html'"
        >
            Collection
        </button>
  <button
            class="collection"
            onclick="window.location.href='owned.html'"
        >
            Moveset Change(Own Pokemon)
        </button>
        <button
            class="battle"
            onclick="window.location.href='battle.html'"
        >
            Battle Helper
        </button>

        <button
            class="collection"
            onclick="window.location.href='battle-history.html'"
        >
            History
        </button>

    </div>

</div>
<!-- PASTE HERE -->

<div class="card">

<h2>🦹🏻‍♂️Trainer Assets🦹🏻‍♂️</h2>

<br>

<div class="stats">

<div class="stat">

<h3> 👁️Trainer ID👁️</h3>

<br>

<img
id="trainerIdImg"
onclick="openImage(this.src)"
style="
width:100%;
height:220px;
object-fit:contain;
background:#0f172a;
border-radius:10px;
display:none;
cursor:pointer;
">

<input
type="file"
id="trainerIdFile"
accept="image/*">

</div>

<div class="stat">

<h3>⚡ Dynamax QR</h3>

<br>

<img
id="dynamaxImg"
onclick="openImage(this.src)"
style="
width:100%;
height:220px;
object-fit:contain;
background:#0f172a;
border-radius:10px;
display:none;
cursor:pointer;
">

<input
type="file"
id="dynamaxFile"
accept="image/*">

</div>

</div>

</div>
<div class="card">

<h2
onclick="toggleSupportCards()"
style="
cursor:pointer;
display:flex;
justify-content:space-between;
align-items:center;
user-select:none;
">

<span>🃏 Support Cards</span>

<span id="supportArrow">▼</span>

</h2>

<div
id="supportContainer"
style="margin-top:20px;">

<div
id="supportCards"
class="stats">
</div>

</div>

</div>

<script>

const db = supabase.createClient(
    'https://dzbpzlkpjbascrjozcih.supabase.co',
    'sb_publishable_AXT6yLPWDsSJ43uf14KMIQ_tlEoOt4r'
);

const userId =
    localStorage.getItem('user_id');

const username =
    localStorage.getItem('username');
const STORAGE_BUCKET = "trainer-assets";
if(!userId){

    window.location.href =
        'index.html';

}

document.getElementById('welcome')
    .innerText =
    `Welcome, ${username}`;

loadStats();
loadTrainerAssets();
    document
.getElementById("trainerIdFile")
.addEventListener("change",(e)=>{

uploadAsset(

e.target.files[0],

"trainer_id",

"trainerIdImg"

);

});

document
.getElementById("dynamaxFile")
.addEventListener("change",(e)=>{

uploadAsset(

e.target.files[0],

"dynamax_qr",

"dynamaxImg"

);

});
async function loadStats(){

    const { count: total } =
        await db
        .from('pokemon_master')
        .select('*', {
            count:'exact',
            head:true
        });

    const { count: collected } =
        await db
        .from('user_collection')
        .select('*', {
            count:'exact',
            head:true
        })
        .eq('user_id', userId);

    document.getElementById(
        'totalPokemon'
    ).innerText =
        total || 0;

    document.getElementById(
        'collectedPokemon'
    ).innerText =
        collected || 0;

    const percent =
        total
        ? ((collected || 0) / total * 100)
            .toFixed(1)
        : 0;

    document.getElementById(
        'completion'
    ).innerText =
        percent + '%';
}
async function loadTrainerAssets(){

await loadTrainerImage(
"trainer_id",
"trainerIdImg"
);

await loadTrainerImage(
"dynamax_qr",
"dynamaxImg"
);

await loadSupportCards();
}

async function loadTrainerImage(type,imgId){

const {data,error}=await db

.from("trainer_assets")

.select("*")

.eq("user_id",Number(userId))

.eq("asset_type",type)

.maybeSingle();

if(error || !data) return;

const img =
document.getElementById(imgId);

img.src=data.image_url+"?"+Date.now();
img.style.display="block";
if(type.startsWith("support_")){

const slot =
type.split("_")[1];

document.getElementById(
`supportName${slot}`
).value =
data.asset_name || "";

document.getElementById(
`supportType${slot}`
).value =
data.asset_category || "Support";
}
}

async function loadSupportCards(){

const holder =
document.getElementById("supportCards");

holder.innerHTML="";

for(let i=1;i<=15;i++){

holder.innerHTML += `
<div class="stat">

<img
id="supportImg${i}"
onclick="openImage(this.src)"
style="
width:100%;
height:180px;
object-fit:contain;
background:#0f172a;
border-radius:10px;
display:none;
margin-bottom:10px;
">

<input
type="text"
id="supportName${i}"
placeholder="Card Name"
onblur="saveSupportInfo(${i})"
style="
width:100%;
padding:10px;
margin-bottom:10px;
">

<select
id="supportType${i}"
onchange="saveSupportInfo(${i})"
style="
width:100%;
padding:10px;
margin-bottom:10px;
">

<option value="Support">Support</option>
<option value="Item">Item</option>
<option value="Pokémon Tool">Pokémon Tool</option>
<option value="Stadium">Stadium</option>
<option value="ACE SPEC">ACE SPEC</option>
<option value="Trainer">Trainer</option>
<option value="Other">Other</option>

</select>

<input
type="file"
id="supportFile${i}"
accept="image/*">

</div>
`;

}

// <-- FIRST LOOP ENDS HERE

for(let i=1;i<=15;i++){

document
.getElementById(`supportFile${i}`)
.addEventListener("change",(e)=>{

uploadAsset(

e.target.files[0],

`support_${i}`,

`supportImg${i}`

);

});

await loadTrainerImage(

`support_${i}`,

`supportImg${i}`

);

}

}
    async function uploadAsset(file,assetType,imgId){

if(!file) return;

const extension =
file.name.split(".").pop();

const fileName =
`${userId}/${assetType}.${extension}`;

const {error:uploadError}=

await db.storage

.from(STORAGE_BUCKET)

.upload(

fileName,

file,

{

upsert:true

}

);

if(uploadError){

console.error(uploadError);

alert("Upload failed");

return;

}

const {data} =

db.storage

.from(STORAGE_BUCKET)

.getPublicUrl(fileName);

const imageUrl =
data.publicUrl;

const {error}=

await db

.from("trainer_assets")

.upsert({

user_id:Number(userId),
asset_type:assetType,
image_url:imageUrl,

asset_name:
assetType.startsWith("support_")
?
document.getElementById(
`supportName${assetType.split("_")[1]}`
).value
:
null,

asset_category:
assetType.startsWith("support_")
?
document.getElementById(
`supportType${assetType.split("_")[1]}`
).value
:
null

},

{

onConflict:"user_id,asset_type"

});

if(error){

console.error(error);

alert("Database save failed");

return;

}

const img =
document.getElementById(imgId);

img.src=imageUrl+"?"+Date.now();

img.style.display="block";

}
    async function saveSupportInfo(slot){

const {error}=await db

.from("trainer_assets")

.update({

asset_name:
document.getElementById(`supportName${slot}`).value,

asset_category:
document.getElementById(`supportType${slot}`).value

})

.eq("user_id",Number(userId))
.eq("asset_type",`support_${slot}`);

if(error){

console.error(error);

}

}
    function openImage(src){

const modal =
document.getElementById("imageModal");

document.getElementById("modalImage").src = src;

modal.style.display = "flex";

}

function closeImage(){

document.getElementById("imageModal").style.display = "none";

}

    function toggleSupportCards(){

const container =
document.getElementById("supportContainer");

const arrow =
document.getElementById("supportArrow");

if(container.style.display==="none"){

container.style.display="block";

arrow.innerHTML="▼";

}else{

container.style.display="none";

arrow.innerHTML="►";

}

}
function logout(){

    localStorage.clear();

    window.location.href =
        'index.html';
}

</script>
<div
id="imageModal"
onclick="closeImage()"
style="
display:none;
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,.9);
justify-content:center;
align-items:center;
z-index:9999;
cursor:pointer;
">

<img
id="modalImage"
style="
max-width:95%;
max-height:95%;
border-radius:12px;
box-shadow:0 0 25px black;
">

</div>
</body>
</html>
