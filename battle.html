<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Battle Helper</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
min-height:100vh;
}

header{
background:#1e293b;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{
max-width:1400px;
margin:auto;
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

select{
width:100%;
padding:12px;
border:none;
border-radius:8px;
font-size:16px;
}

.enemy-info{
margin-top:15px;
line-height:1.8;
}

.results{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
gap:15px;
margin-top:20px;
}

.pokemon-card{
background:#334155;
padding:15px;
border-radius:10px;
}

.tag{
color:#94a3b8;
font-size:13px;
}

.name{
font-size:20px;
font-weight:bold;
margin:8px 0;
}

.rarity{
color:#facc15;
margin-bottom:8px;
}

.type{
color:#38bdf8;
margin-bottom:5px;
}

.version{
color:#94a3b8;
font-size:13px;
}

.none{
text-align:center;
padding:25px;
}

button{
background:#3b82f6;
color:white;
border:none;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
}

</style>

</head>

<body>

<header>

<h2>⚔️ Battle Helper</h2>

<button onclick="location.href='dashboard.html'">
Dashboard
</button>

</header>

<div class="container">

<div class="card">

<h3>Enemy Team</h3>

<div id="enemyTeamBox"
style="
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:15px;
">
</div>

<button onclick="buildBestTeam()">
🤖 Auto Build Team
</button>

<br><br>

<br>

<input
type="text"
id="enemySearch"
placeholder="Search Pokémon..."
onkeyup="searchPokemon()"
style="
width:100%;
padding:12px;
border:none;
border-radius:8px;
font-size:16px;
">

<div
id="searchResults"
style="
margin-top:10px;
max-height:250px;
overflow-y:auto;
">
</div>

<div class="enemy-info" id="enemyInfo"></div>

</div>

<div class="card">

<h3>Recommended Pokémon You Own</h3>

<div id="results"></div>

</div>

</div>

<script>

const db = supabase.createClient(
'https://dzbpzlkpjbascrjozcih.supabase.co',
'sb_publishable_AXT6yLPWDsSJ43uf14KMIQ_tlEoOt4r'
);

const userId = localStorage.getItem('user_id');

if(!userId){
location.href='index.html';
}

let allPokemon = [];
let ownedPokemon = [];
let enemyTeam = [];
  
const weaknesses = {

Fire:['Water','Ground','Rock'],
Water:['Electric','Grass'],
Grass:['Fire','Ice','Flying','Bug'],
Electric:['Ground'],
Rock:['Water','Grass','Ground','Steel'],
Ground:['Water','Grass','Ice'],
Flying:['Electric','Rock','Ice'],
Dragon:['Ice','Dragon','Fairy'],
Dark:['Bug','Fairy','Fighting'],
Psychic:['Bug','Ghost','Dark'],
Ghost:['Ghost','Dark'],
Fighting:['Flying','Psychic','Fairy'],
Ice:['Fire','Rock','Steel','Fighting'],
Steel:['Fire','Ground','Fighting'],
Fairy:['Steel','Poison'],
Bug:['Fire','Flying','Rock'],
Poison:['Ground','Psychic'],
Normal:['Fighting']

};

init();

async function init(){

await loadPokemon();
await loadOwnedPokemon();
searchPokemon();
}

async function loadPokemon(){

const {data,error} = await db
.from('pokemon_master')
.select('*')
.not('pokemon_type_1','is',null);

if(error){
console.error(error);
return;
}

allPokemon = data;

}

async function loadOwnedPokemon(){

const {data,error} = await db
.from('user_collection')
.select(`
pokemon_id,
pokemon_master(
id,
tag_code,
pokemon_name,
version,
rarity,
pokemon_type_1,
pokemon_type_2,
image_url

)
`)
.eq('user_id', Number(userId))
.eq('owned', true);

if(error){
console.error(error);
return;
}

ownedPokemon = data.map(x=>x.pokemon_master);

}
function searchPokemon(){

const search =
document
.getElementById('enemySearch')
.value
.toLowerCase();

const results =
document.getElementById('searchResults');

if(search.length < 1){

results.innerHTML = '';
return;

}

const matches =
allPokemon
.filter(p=>

p.pokemon_name
.toLowerCase()
.includes(search)

||

(p.tag_code || '')
.toLowerCase()
.includes(search)

)
.slice(0,20);

results.innerHTML =
matches.map(p => `

<div
onclick="selectPokemon(${p.id})"
style="
padding:10px;
cursor:pointer;
background:#334155;
margin-bottom:5px;
border-radius:8px;
">

<b>${p.pokemon_name}</b>

${p.tag_code
? `<span style="color:#94a3b8">(${p.tag_code})</span>`
: ''}

</div>

`).join('');

}
function selectPokemon(id){

const enemy =
allPokemon.find(x => x.id == id);

if(!enemy) return;

if(enemyTeam.length >= 3){
alert('Maximum 3 enemies');
return;
}

enemyTeam.push(enemy);

renderEnemyTeam();

document
.getElementById('enemySearch')
.value='';

document
.getElementById('searchResults')
.innerHTML='';

}
  
function renderEnemyTeam(){

let html='';

enemyTeam.forEach((p,index)=>{

html += `

<div style="
background:#334155;
padding:10px;
border-radius:10px;
">

${p.pokemon_name}

<button
onclick="removeEnemy(${index})"
style="
margin-left:10px;
background:red;
">
X
</button>

</div>

`;

});

document
.getElementById('enemyTeamBox')
.innerHTML = html;

}
  function removeEnemy(index){

enemyTeam.splice(index,1);

renderEnemyTeam();

}
function buildBestTeam(){

if(enemyTeam.length === 0){
alert('Select enemies first');
return;
}

let enemyWeaknesses = [];

enemyTeam.forEach(enemy=>{

if(enemy.pokemon_type_1){

enemyWeaknesses.push(
...(weaknesses[enemy.pokemon_type_1] || [])
);

}

if(enemy.pokemon_type_2){

enemyWeaknesses.push(
...(weaknesses[enemy.pokemon_type_2] || [])
);

}

});

const scored = ownedPokemon.map(p=>{

let score = 0;

enemyWeaknesses.forEach(type=>{

if(
p.pokemon_type_1 === type
||
p.pokemon_type_2 === type
){
score++;
}

});

return {
...p,
score
};

});

const bestTeam = scored
.filter(x=>x.score > 0)
.sort((a,b)=>{

if(b.score !== a.score)
return b.score - a.score;

if(b.rarity !== a.rarity)
return b.rarity - a.rarity;

return a.pokemon_name.localeCompare(
b.pokemon_name
);

})
.slice(0,3);

renderBestTeam(bestTeam);

}
  
  
  function renderBestTeam(team){

let html='';

if(team.length===0){

html=`
<div class="none">
No suitable team found.
</div>
`;

}else{

html='<div class="results">';

team.forEach((p,index)=>{

const medals =
['🥇','🥈','🥉'];

html += `

<div class="pokemon-card">

<div style="
font-size:24px;
margin-bottom:10px;
">
${medals[index]}
</div>

${p.image_url ? `
<img
src="${p.image_url}"
style="
width:100%;
height:150px;
object-fit:contain;
margin-bottom:10px;
">
` : ''}

<div class="tag">
${p.tag_code || ''}
</div>

<div class="name">
${p.pokemon_name}
</div>

<div class="rarity">
${'⭐'.repeat(p.rarity)}
</div>

<div class="type">
${p.pokemon_type_1 || ''}
${p.pokemon_type_2 ? ' / ' + p.pokemon_type_2 : ''}
</div>

<div>
Score: ${p.score}
</div>

<div class="version">
Version ${p.version}
</div>

</div>

`;

});

html+='</div>';

}

document
.getElementById('results')
.innerHTML = html;

}
function findCounters(enemyId){

if(!enemyId) return;

const enemy =
allPokemon.find(x=>x.id == enemyId);

if(!enemy) return;

let weakTo = [];

if(enemy.pokemon_type_1){
weakTo.push(
...(weaknesses[enemy.pokemon_type_1] || [])
);
}

if(enemy.pokemon_type_2){
weakTo.push(
...(weaknesses[enemy.pokemon_type_2] || [])
);
}

weakTo = [...new Set(weakTo)];

document.getElementById('enemyInfo').innerHTML = `

<b>${enemy.pokemon_name}</b><br>

Type 1:
${enemy.pokemon_type_1 || '-'}<br>

Type 2:
${enemy.pokemon_type_2 || '-'}<br>

Weak To:
${weakTo.join(', ')}

`;

const counters =
ownedPokemon
.filter(p =>

weakTo.includes(p.pokemon_type_1) ||

weakTo.includes(p.pokemon_type_2)

)
.sort((a,b)=>{

if(b.rarity !== a.rarity)
return b.rarity - a.rarity;

return a.pokemon_name.localeCompare(
b.pokemon_name
);

});

let html='';

if(counters.length===0){

html=`
<div class="none">
No owned counters found.
</div>
`;

}else{

html='<div class="results">';

counters.forEach(p=>{

html += `

<div class="pokemon-card">

${p.image_url ? `
<img
src="${p.image_url}"
style="
width:100%;
height:150px;
object-fit:contain;
margin-bottom:10px;
">
` : ''}

<div class="tag">
${p.tag_code || ''}
</div>

<div class="name">
${p.pokemon_name}
</div>

<div class="rarity">
${'⭐'.repeat(p.rarity)}
</div>

<div class="type">
${p.pokemon_type_1 || ''}
${p.pokemon_type_2 ? ' / ' + p.pokemon_type_2 : ''}
</div>

<div class="version">
Version ${p.version}
</div>

</div>

`;

});

html+='</div>';

}

document.getElementById('results').innerHTML = html;

}

</script>

</body>
</html>
