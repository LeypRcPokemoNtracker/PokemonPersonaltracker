<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Battle Helper</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
min-height:100vh;
}

header{
background:#1e293b;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{
max-width:1400px;
margin:auto;
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

select{
width:100%;
padding:12px;
border:none;
border-radius:8px;
font-size:16px;
}

.enemy-info{
margin-top:15px;
line-height:1.8;
}
.enemy-slots{

display:grid;

grid-template-columns:repeat(3,1fr);

gap:20px;

margin-top:20px;

margin-bottom:20px;

}

.enemy-slot{

background:white;

border:5px solid black;

height:300px;

cursor:pointer;

display:flex;

justify-content:center;

align-items:center;

text-align:center;

color:black;

font-weight:bold;

font-size:18px;

position:relative;

transition:.2s;

}

.enemy-slot:hover{

transform:scale(1.02);

}

.enemy-slot.active{

border-color:#3b82f6;

box-shadow:0 0 18px #3b82f688;

}

.enemy-slot img{

max-width:90%;

max-height:180px;

object-fit:contain;

}
.results{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
gap:15px;
margin-top:20px;
}

.pokemon-card{
background:#334155;
padding:15px;
border-radius:10px;
}

.tag{
color:#94a3b8;
font-size:13px;
}

.name{
font-size:20px;
font-weight:bold;
margin:8px 0;
}

.rarity{
color:#facc15;
margin-bottom:8px;
}

.type{
color:#38bdf8;
margin-bottom:5px;
}

.version{
color:#94a3b8;
font-size:13px;
}

.none{
text-align:center;
padding:25px;
}

button{
background:#3b82f6;
color:white;
border:none;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
}

</style>

</head>

<body>

<header>

<h2>⚔️ Battle Helper</h2>

<div style="display:flex;gap:10px;">
<button onclick="location.href='dashboard.html'">
Home
</button>
<button onclick="location.href='battle-history.html'">
📖 History
</button>
<button onclick="location.href='collection.html'">
Collections
</button>
<button onclick="location.href='owned.html'">
Movesets
</button>

</div>

</header>

<div class="container">

<div class="card">

<h3>Enemy Pokémons</h3>

<div class="enemy-slots">

<div
class="enemy-slot"
id="slot1"
onclick="setActiveSlot(0)">

<div id="slotContent0">

Choose Pokémon

</div>

</div>

<div
class="enemy-slot"
id="slot2"
onclick="setActiveSlot(1)">

<div id="slotContent1">

Choose Pokémon

</div>

</div>

<div
class="enemy-slot"
id="slot3"
onclick="setActiveSlot(2)">

<div id="slotContent2">

Choose Pokémon

</div>

</div>

</div>

<br>

<input
type="text"
id="enemySearch"
placeholder="Search Pokémon..."
onkeyup="searchPokemon()"
style="
width:100%;
padding:12px;
border:none;
border-radius:8px;
font-size:16px;
">

<div
id="searchResults"
style="
margin-top:10px;
max-height:250px;
overflow-y:auto;
">
</div>
</div>
<div class="card">

<h3>Recommended Pokémon You Own</h3>
<div style="display:flex;gap:10px;margin:15px 0;">

<select id="rarityFilter" onchange="renderOwnedPokemon()">

<option value="All">All Rarities</option>
<option value="6">⭐⭐⭐⭐⭐⭐</option>
<option value="5">⭐⭐⭐⭐⭐</option>
<option value="4">⭐⭐⭐⭐</option>
<option value="1">⭐ Special</option>

</select></div>
<div id="results"></div>

<hr style="margin:25px 0;border-color:#334155;">

<h3>Battle Result</h3>

<br>

<select id="battleResult">

<option value="Win">🟢 Win</option>

<option value="Loss">🔴 Loss</option>

<option value="Draw">🟡 Draw</option>

</select>

<br><br>

<textarea
id="battleNotes"
placeholder="Notes (optional)"
style="
width:100%;
height:100px;
padding:12px;
border:none;
border-radius:8px;
resize:vertical;
"></textarea>

<br><br>

<button onclick="saveBattle()">
💾 Save Battle
</button>

</div>

</div>

<script>

const db = supabase.createClient(
'https://dzbpzlkpjbascrjozcih.supabase.co',
'sb_publishable_AXT6yLPWDsSJ43uf14KMIQ_tlEoOt4r'
);

const userId = localStorage.getItem('user_id');

if(!userId){
location.href='index.html';
}

let allPokemon = [];
let ownedPokemon = [];
// Multiple selected enemies
let selectedEnemies = [null,null,null];

let activeSlot = 0;
  function setActiveSlot(index){

activeSlot=index;

document
.querySelectorAll(".enemy-slot")
.forEach(x=>x.classList.remove("active"));

document
.getElementById("slot"+(index+1))
.classList.add("active");

}
const weaknesses = {

Fire:['Water','Ground','Rock'],
Water:['Electric','Grass'],
Grass:['Fire','Ice','Flying','Bug'],
Electric:['Ground'],
Rock:['Water','Grass','Ground','Steel'],
Ground:['Water','Grass','Ice'],
Flying:['Electric','Rock','Ice'],
Dragon:['Ice','Dragon','Fairy'],
Dark:['Bug','Fairy','Fighting'],
Psychic:['Bug','Ghost','Dark'],
Ghost:['Ghost','Dark'],
Fighting:['Flying','Psychic','Fairy'],
Ice:['Fire','Rock','Steel','Fighting'],
Steel:['Fire','Ground','Fighting'],
Fairy:['Steel','Poison'],
Bug:['Fire','Flying','Rock'],
Poison:['Ground','Psychic'],
Normal:['Fighting']

};

init();

async function init(){

await loadPokemon();
await loadOwnedPokemon();

setActiveSlot(0);
renderEnemySlots();
renderOwnedPokemon();

}

async function loadPokemon(){

const {data,error} = await db
.from('pokemon_master')
.select('*')
.not('pokemon_type_1','is',null);

if(error){
console.error(error);
return;
}

allPokemon = data;

}
async function loadOwnedPokemon(){

const {data,error}=await db

.from("user_collection")

.select(`
pokemon_id,
pokemon_master(
id,
tag_code,
pokemon_name,
version,
rarity,
pokemon_type_1,
pokemon_type_2,
image_url,
move_id,
mezastar_moves(
move_name,
move_type
)
)
`)

.eq("user_id",Number(userId))
.eq("owned",true);

if(error){

console.log(error);

return;

}

ownedPokemon=data.map(x=>({

...x.pokemon_master,

move_name:
x.pokemon_master.mezastar_moves?.move_name || null,

move_type:
x.pokemon_master.mezastar_moves?.move_type || null

}));

}

function searchPokemon(){

const search =
document
.getElementById('enemySearch')
.value
.toLowerCase();

const results =
document.getElementById('searchResults');

if(search.length < 1){

results.innerHTML = '';
return;

}

const matches =
allPokemon
.filter(p=>

p.pokemon_name
.toLowerCase()
.includes(search)

||

(p.tag_code || '')
.toLowerCase()
.includes(search)

)
.slice(0,20);

results.innerHTML =
matches.map(p => `

<div
onclick="selectPokemon(${p.id})"
style="
padding:10px;
cursor:pointer;
background:#334155;
margin-bottom:5px;
border-radius:8px;
">

<b>${p.pokemon_name}</b>

${p.tag_code
? `<span style="color:#94a3b8">(${p.tag_code})</span>`
: ''}

</div>

`).join('');

}
function selectPokemon(id){

const enemy=
allPokemon.find(x=>x.id==id);

if(!enemy) return;

selectedEnemies[activeSlot]=enemy;

renderEnemySlots();

renderOwnedPokemon();

document.getElementById("enemySearch").value="";

document.getElementById("searchResults").innerHTML="";

}
function removeEnemy(index){

selectedEnemies[index]=null;

renderEnemySlots();

renderOwnedPokemon();

}



function renderEnemySlots(){

selectedEnemies.forEach((enemy,index)=>{

const slot=document.getElementById("slotContent"+index);

if(!enemy){

slot.innerHTML="Choose Pokémon";

return;

}

slot.innerHTML=`

<img
src="${enemy.image_url}"
style="max-width:150px;">

<br><br>

<b>${enemy.pokemon_name}</b>

<br>

${enemy.tag_code}

<br><br>

<button
onclick="event.stopPropagation();removeEnemy(${index})">

❌

</button>

`;

});

}
  
function renderOwnedPokemon(){

let displayPokemon=[...ownedPokemon];
const rarity =
document.getElementById("rarityFilter").value;

if(rarity !== "All"){

displayPokemon =
displayPokemon.filter(p=>

String(p.rarity)===rarity

);

}


displayPokemon.sort((a,b)=>{


const aEffective = selectedEnemies
.filter(Boolean)
.some(enemy => {

const attackType =
a.move_type || a.pokemon_type_1;

return (
(weaknesses[enemy.pokemon_type_1] || []).includes(attackType)
||
(enemy.pokemon_type_2 &&
(weaknesses[enemy.pokemon_type_2] || []).includes(attackType))
);

});

const bEffective = selectedEnemies
.filter(Boolean)
.some(enemy => {

const attackType =
b.move_type || b.pokemon_type_1;

return (
(weaknesses[enemy.pokemon_type_1] || []).includes(attackType)
||
(enemy.pokemon_type_2 &&
(weaknesses[enemy.pokemon_type_2] || []).includes(attackType))
);

});
if(aEffective!==bEffective){

return bEffective-aEffective;

}

if(b.rarity!==a.rarity){

return b.rarity-a.rarity;

}

return a.pokemon_name.localeCompare(b.pokemon_name);

});

let html='<div class="results">';

displayPokemon.forEach(p=>{

html+=`

<div class="pokemon-card">

${p.image_url ? `
<img
src="${p.image_url}"
style="
width:100%;
height:150px;
object-fit:contain;
margin-bottom:10px;
">
` : ""}

<div class="tag">
${p.tag_code}
</div>

<div class="name">
${p.pokemon_name}
</div>

<div class="rarity">
${"⭐".repeat(p.rarity)}
</div>

<div class="type">

${
p.move_name
?
`⚔️ ${p.move_name}<br>(${p.move_type})`
:
`Using Pokémon Type<br>${p.pokemon_type_1}`
}

</div>

${
selectedEnemies
.filter(Boolean)
.some(enemy=>{

const attackType =
p.move_type || p.pokemon_type_1;

return (
(weaknesses[enemy.pokemon_type_1] || []).includes(attackType)
||
(enemy.pokemon_type_2 &&
(weaknesses[enemy.pokemon_type_2] || []).includes(attackType))
);

})

?

`<div style="
margin-top:10px;
background:#16a34a;
padding:6px;
border-radius:6px;
text-align:center;
font-weight:bold;
">

✅ Super Effective

</div>`

:

""

}



</div>

`;

});

html+="</div>";

document.getElementById("results").innerHTML=html;

}

  async function saveBattle(){
if(selectedEnemies.filter(Boolean).length===0){
alert("Select an enemy Pokémon.");

return;

}



const result =
document.getElementById("battleResult").value;

const notes =
document.getElementById("battleNotes").value;

const {data,error}=await db

.from("battle_history")

.insert({

user_id:Number(userId),

result:result,

notes:notes

})

.select()

.single();

if(error){

console.log(error);

alert("Unable to save battle.");

return;

}

const battleId=data.id;

await db

.from("battle_enemy")

.insert(

selectedEnemies
.filter(Boolean)
.map((enemy,index)=>({

battle_id:battleId,

slot:index+1,

pokemon_id:enemy.id

}))

);

alert("✅ Battle Saved!");

selectedEnemies = [null,null,null];
renderEnemySlots();
renderOwnedPokemon();
document.getElementById("battleNotes").value="";
document.getElementById("battleResult").selectedIndex = 0;
document.getElementById("enemySearch").value="";
document.getElementById("searchResults").innerHTML="";

}


</script>

</body>
</html>
