<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Battle Helper</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
min-height:100vh;
}

header{
background:#1e293b;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{
max-width:1400px;
margin:auto;
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

select{
width:100%;
padding:12px;
border:none;
border-radius:8px;
font-size:16px;
}

.enemy-info{
margin-top:15px;
line-height:1.8;
}

.results{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
gap:15px;
margin-top:20px;
}

.pokemon-card{
background:#334155;
padding:15px;
border-radius:10px;
}

.tag{
color:#94a3b8;
font-size:13px;
}

.name{
font-size:20px;
font-weight:bold;
margin:8px 0;
}

.rarity{
color:#facc15;
margin-bottom:8px;
}

.type{
color:#38bdf8;
margin-bottom:5px;
}

.version{
color:#94a3b8;
font-size:13px;
}

.none{
text-align:center;
padding:25px;
}

button{
background:#3b82f6;
color:white;
border:none;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
}

</style>

</head>

<body>

<header>

<h2>⚔️ Battle Helper</h2>

<div style="display:flex;gap:10px;">

<button onclick="location.href='battle-history.html'">
📖 History
</button>

<button onclick="location.href='dashboard.html'">
Dashboard
</button>

</div>

</header>

<div class="container">

<div class="card">

<h3>Enemy Pokémon</h3>

<div id="enemyInfo"></div>

    

<br><br>

<br>

<input
type="text"
id="enemySearch"
placeholder="Search Pokémon..."
onkeyup="searchPokemon()"
style="
width:100%;
padding:12px;
border:none;
border-radius:8px;
font-size:16px;
">

<div
id="searchResults"
style="
margin-top:10px;
max-height:250px;
overflow-y:auto;
">
</div>


</div>

<div class="card">

<h3>Recommended Pokémon You Own</h3>

<div id="results"></div>

<hr style="margin:25px 0;border-color:#334155;">

<h3>Battle Result</h3>

<br>

<select id="battleResult">

<option value="Win">🟢 Win</option>

<option value="Loss">🔴 Loss</option>

<option value="Draw">🟡 Draw</option>

</select>

<br><br>

<textarea
id="battleNotes"
placeholder="Notes (optional)"
style="
width:100%;
height:100px;
padding:12px;
border:none;
border-radius:8px;
resize:vertical;
"></textarea>

<br><br>

<button onclick="saveBattle()">
💾 Save Battle
</button>

</div>

</div>

<script>

const db = supabase.createClient(
'https://dzbpzlkpjbascrjozcih.supabase.co',
'sb_publishable_AXT6yLPWDsSJ43uf14KMIQ_tlEoOt4r'
);

const userId = localStorage.getItem('user_id');

if(!userId){
location.href='index.html';
}

let allPokemon = [];
let ownedPokemon = [];
let selectedEnemy = null;

  
const weaknesses = {

Fire:['Water','Ground','Rock'],
Water:['Electric','Grass'],
Grass:['Fire','Ice','Flying','Bug'],
Electric:['Ground'],
Rock:['Water','Grass','Ground','Steel'],
Ground:['Water','Grass','Ice'],
Flying:['Electric','Rock','Ice'],
Dragon:['Ice','Dragon','Fairy'],
Dark:['Bug','Fairy','Fighting'],
Psychic:['Bug','Ghost','Dark'],
Ghost:['Ghost','Dark'],
Fighting:['Flying','Psychic','Fairy'],
Ice:['Fire','Rock','Steel','Fighting'],
Steel:['Fire','Ground','Fighting'],
Fairy:['Steel','Poison'],
Bug:['Fire','Flying','Rock'],
Poison:['Ground','Psychic'],
Normal:['Fighting']

};

init();

async function init(){

await loadPokemon();
await loadOwnedPokemon();
searchPokemon();
}

async function loadPokemon(){

const {data,error} = await db
.from('pokemon_master')
.select('*')
.not('pokemon_type_1','is',null);

if(error){
console.error(error);
return;
}

allPokemon = data;

}
async function loadOwnedPokemon(){

const {data,error} = await db

.from("user_collection")

.select(`
pokemon_id,

pokemon_master(
id,
tag_code,
pokemon_name,
version,
rarity,
pokemon_type_1,
pokemon_type_2,
image_url
),

user_tag_config(
move_id,
notes,
mezastar_moves(
move_name,
move_type
)
)

`)

.eq("user_id",Number(userId))
.eq("owned",true);

if(error){

console.log(error);

return;

}

ownedPokemon=data.map(x=>{
    

const config=x.user_tag_config?.[0];

return{

...x.pokemon_master,

move_name:
config?.mezastar_moves?.move_name || null,

move_type:
config?.mezastar_moves?.move_type || null,

notes:
config?.notes || ""

};

});

}

function searchPokemon(){

const search =
document
.getElementById('enemySearch')
.value
.toLowerCase();

const results =
document.getElementById('searchResults');

if(search.length < 1){

results.innerHTML = '';
return;

}

const matches =
allPokemon
.filter(p=>

p.pokemon_name
.toLowerCase()
.includes(search)

||

(p.tag_code || '')
.toLowerCase()
.includes(search)

)
.slice(0,20);

results.innerHTML =
matches.map(p => `

<div
onclick="selectPokemon(${p.id})"
style="
padding:10px;
cursor:pointer;
background:#334155;
margin-bottom:5px;
border-radius:8px;
">

<b>${p.pokemon_name}</b>

${p.tag_code
? `<span style="color:#94a3b8">(${p.tag_code})</span>`
: ''}

</div>

`).join('');

}
function selectPokemon(id){

selectedEnemy =
allPokemon.find(x => x.id == id);

if(!selectedEnemy) return;

document.getElementById("enemySearch").value="";
document.getElementById("searchResults").innerHTML="";

renderEnemyInfo();
renderOwnedPokemon();

}
  



function renderEnemyInfo(){

document.getElementById("enemyInfo").innerHTML=`

<div class="pokemon-card">

${selectedEnemy.image_url ? `
<img
src="${selectedEnemy.image_url}"
style="
width:120px;
height:120px;
object-fit:contain;
">
` : ""}

<div class="tag">
${selectedEnemy.tag_code}
</div>

<div class="name">
${selectedEnemy.pokemon_name}
</div>

<div class="rarity">
${"⭐".repeat(selectedEnemy.rarity)}
</div>

<div class="version">
Version ${selectedEnemy.version}
</div>

</div>

`;

}
  
  
function renderOwnedPokemon(){

let displayPokemon=[...ownedPokemon];

if(selectedEnemy){

let weakTo=[];

if(selectedEnemy.pokemon_type_1){

weakTo.push(
...(weaknesses[selectedEnemy.pokemon_type_1]||[])
);

}

if(selectedEnemy.pokemon_type_2){

weakTo.push(
...(weaknesses[selectedEnemy.pokemon_type_2]||[])
);

}

weakTo=[...new Set(weakTo)];

const recommended=ownedPokemon.filter(p=>{

const attackType=
p.move_type || p.pokemon_type_1;

return weakTo.includes(attackType);

});

if(recommended.length>0){

displayPokemon=recommended;

}

}

displayPokemon.sort((a,b)=>{

if(b.rarity!==a.rarity)
return b.rarity-a.rarity;

return a.pokemon_name.localeCompare(b.pokemon_name);

});

let html='<div class="results">';

displayPokemon.forEach(p=>{

html+=`

<div class="pokemon-card">

${p.image_url ? `
<img
src="${p.image_url}"
style="
width:100%;
height:150px;
object-fit:contain;
margin-bottom:10px;
">
` : ""}

<div class="tag">
${p.tag_code}
</div>

<div class="name">
${p.pokemon_name}
</div>

<div class="rarity">
${"⭐".repeat(p.rarity)}
</div>

<div class="type">

${
p.move_name
?
`⚔️ ${p.move_name}<br>(${p.move_type})`
:
`Using Pokémon Type<br>${p.pokemon_type_1}`
}

</div>

<div class="version">
Version ${p.version}
</div>

${
p.notes
?
`<div style="margin-top:8px;color:#cbd5e1;font-size:13px;">
📝 ${p.notes}
</div>`
:
""
}

</div>

`;

});

html+="</div>";

document.getElementById("results").innerHTML=html;

}

  async function saveBattle(){
if(!selectedEnemy){

alert("Select an enemy Pokémon.");

return;

}



const result =
document.getElementById("battleResult").value;

const notes =
document.getElementById("battleNotes").value;

const {data,error}=await db

.from("battle_history")

.insert({

user_id:Number(userId),

result:result,

notes:notes

})

.select()

.single();

if(error){

console.log(error);

alert("Unable to save battle.");

return;

}

const battleId=data.id;

await db
.from("battle_enemy")
.insert({

battle_id: battleId,
slot: 1,
pokemon_id: selectedEnemy.id

});

alert("✅ Battle Saved!");

selectedEnemy = null;

document.getElementById("results").innerHTML="";
document.getElementById("battleNotes").value="";
document.getElementById("battleResult").selectedIndex = 0;
document.getElementById("enemySearch").value="";
document.getElementById("searchResults").innerHTML="";
document.getElementById("enemyInfo").innerHTML="";

}


</script>

</body>
</html>
