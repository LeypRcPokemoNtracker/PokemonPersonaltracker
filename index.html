<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Personal Pokemon Mezastar Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:400px;
    background:#1e293b;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,.3);
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.subtitle{
    text-align:center;
    color:#94a3b8;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    margin-bottom:15px;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    color:white;
    font-size:16px;
    cursor:pointer;
}

.primary{
    background:#3b82f6;
}

.primary:hover{
    background:#2563eb;
}

#status{
    margin-top:15px;
    text-align:center;
    min-height:20px;
}

</style>

</head>

<body>

<div class="container">


<h1>​𓆩(◣_◢)𓆪 Personal Pokemon Mezastar Tracker</h1>

<div class="subtitle">
    Enter your username to continue
</div>

<input
    type="text"
    id="username"
    placeholder="Username"
    autocomplete="off"
>

<button
    class="primary"
    onclick="continueUser()"
>
    Continue
</button>

<div id="status"></div>


</div>

<script>

const db = supabase.createClient(
    'https://dzbpzlkpjbascrjozcih.supabase.co',
    'sb_publishable_AXT6yLPWDsSJ43uf14KMIQ_tlEoOt4r'
);

async function continueUser(){

    const username =
        document.getElementById('username')
        .value
        .trim();

    if(!username){
        showStatus('Please enter a username');
        return;
    }

    showStatus('Checking account...');

    const { data: existingUser } = await db
        .from('users')
        .select('*')
        .eq('username', username)
        .maybeSingle();

    let user;

    if(existingUser){

        user = existingUser;

        showStatus('Welcome back ' + username);

    }else{

        const { data, error } = await db
            .from('users')
            .insert({
                username: username
            })
            .select()
            .single();

        if(error){
            showStatus(error.message);
            return;
        }

        user = data;

        showStatus('Account created!');
    }

    localStorage.setItem(
        'user_id',
        user.id
    );

    localStorage.setItem(
        'username',
        user.username
    );

    setTimeout(() => {

        window.location.href =
            'dashboard.html';

    }, 1000);
}

function showStatus(message){

    document.getElementById('status')
        .innerText = message;
}

    document
.getElementById("username")
.addEventListener("keydown", function(event){

    if(event.key === "Enter"){

        event.preventDefault();

        continueUser();

    }

});

</script>

</body>

</html>
