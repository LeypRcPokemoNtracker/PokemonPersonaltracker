<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Collection</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
}

header{
background:#1e293b;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{
padding:20px;
max-width:1400px;
margin:auto;
}

.topbar{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

button{
padding:10px 16px;
border:none;
border-radius:8px;
cursor:pointer;
}

.version-btn{
background:#334155;
color:white;
}

.active{
background:#3b82f6;
}

.search{
padding:10px;
border:none;
border-radius:8px;
width:250px;
}
  #rarityFilter{
padding:10px;
border:none;
border-radius:8px;
background:white;
color:black;
min-width:170px;
}
}

.progress{
margin-bottom:20px;
font-size:18px;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:15px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:12px;
}
  .poke-img{
width:100%;
height:180px;
object-fit:contain;
background:#0f172a;
border-radius:8px;
margin-bottom:10px;
padding:5px;
}

.tag{
color:#94a3b8;
font-size:13px;
margin-bottom:5px;
}

.name{
font-size:18px;
font-weight:bold;
margin-bottom:8px;
}

.rarity{
margin-bottom:10px;
color:#facc15;
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
}

.qty{
width:70px;
padding:6px;
border:none;
border-radius:6px;
}

</style>
</head>

<body>

<header>

<h2>Collection</h2>

<button onclick="window.location.href='dashboard.html'">
Home
</button>
  <button onclick="window.location.href='owned.html'">
Movesets
</button>
   <button onclick="window.location.href='battle.html'">
Battle
</button>

</header>

<div class="container">

<div class="topbar">
  <button onclick="exportCollection()">
 Export Collection
</button>
<button class="version-btn" onclick="loadOwned(this)">
OWNED
</button>
<button class="version-btn active" onclick="loadVersion(1,this)">
V1
</button>

<button class="version-btn" onclick="loadVersion(2,this)">
V2
</button>

<button class="version-btn" onclick="loadVersion(3,this)">
V3
</button>
  <button class="version-btn" onclick="loadVersion(4,this)">
🌌 Galaxy
</button>
  <button class="version-btn" onclick="loadVersion(5,this)">
Promos
</button>
  
  <button class="version-btn" onclick="loadVersion('all',this)"> 
    ALL 
  </button>

<input
type="text"
id="search"
class="search"
placeholder="Search Pokemon..."
onkeyup="renderPokemon()">
<select id="rarityFilter" onchange="renderPokemon()">

<option value="all"> All Rarities </option>

<option value="6"> ⭐⭐⭐⭐⭐⭐ 6 Star </option>

<option value="5"> ⭐⭐⭐⭐⭐ 5 Star </option>
  <option value="1"> ✨Specials 💥</option>

<option value="4"> ⭐⭐⭐⭐ 4 Star </option>

<option value="3"> ⭐⭐⭐ 3 Star </option>

<option value="2"> ⭐⭐ 2 Star </option>




</select>
</div>

<div class="progress" id="progress">
Loading...
</div>

<div class="grid" id="grid"></div>

</div>

<script>
async function exportCollection(){

const {data,error} = await db
.from('pokemon_master')
.select(`
id,
tag_code,
pokemon_name,
version,
rarity,
user_collection!left(
owned,
quantity,
user_id
)
`);

if(error){
console.error(error);
alert("Export failed.");
return;
}

let csv =
"tag_code,pokemon_name,version,rarity,owned,quantity\n";

data.forEach(p=>{

const record =
(p.user_collection || [])
.find(x=>x.user_id == Number(userId));

const owned =
record ? record.owned : false;

const quantity =
record ? record.quantity : 0;

csv +=
`${p.tag_code},"${p.pokemon_name}",${p.version},${p.rarity},${owned},${quantity}\n`;

});

const blob =
new Blob([csv],{
type:"text/csv;charset=utf-8;"
});

const link =
document.createElement("a");

link.href =
URL.createObjectURL(blob);

link.download =
`Mezastar_Collection_${new Date().toISOString().slice(0,10)}.csv`;

link.click();

URL.revokeObjectURL(link.href);

}
const db = supabase.createClient(
'https://dzbpzlkpjbascrjozcih.supabase.co',
'sb_publishable_AXT6yLPWDsSJ43uf14KMIQ_tlEoOt4r'
);

const userId =
localStorage.getItem('user_id');

if(!userId){
location.href='index.html';
}

let pokemonList=[];
let ownedMap={};
let currentVersion=1;

loadOwned();

async function loadVersion(version,btn=null){

currentVersion=version;

document
.querySelectorAll('.version-btn')
.forEach(x=>x.classList.remove('active'));

if(btn) btn.classList.add('active');

await loadCollection();

let query = db
.from('pokemon_master')
.select('*');

if(version !== 'all'){
query = query.eq('version',version);
}

const {data,error} = await query
.order('version')
.order('rarity',{ascending:false})
  .order('tag_code');

if(error){
console.error(error);
return;
}

pokemonList = data;

renderPokemon();
}
  async function loadOwned(btn=null){

    document
    .querySelectorAll('.version-btn')
    .forEach(x=>x.classList.remove('active'));

    if(btn){
        btn.classList.add('active');
    }

    await loadCollection();

    const ownedIds =
    Object.keys(ownedMap)
    .filter(id => ownedMap[id].owned)
    .map(id => Number(id));

    if(ownedIds.length === 0){
        pokemonList=[];
        renderPokemon();
        return;
    }

    const {data,error}=await db
    .from('pokemon_master')
    .select('*')
    .in('id',ownedIds)
    .order('rarity',{ascending:false})
    .order('version')
    .order('tag_code');

    if(error){
        console.error(error);
        return;
    }

    pokemonList=data;

    renderPokemon();

}




async function loadCollection(){

const {data}=await db
.from('user_collection')
.select('*')
.eq('user_id',userId);

ownedMap={};

(data||[]).forEach(x=>{
ownedMap[x.pokemon_id]=x;
});

}

function renderPokemon(){

const search =
document.getElementById('search')
.value
.toLowerCase();

const rarityFilter =
document.getElementById('rarityFilter')
.value;

const filtered =
pokemonList.filter(p => {

const matchesSearch =
p.pokemon_name
.toLowerCase()
.includes(search);

const matchesRarity =

rarityFilter === 'all'

||

p.rarity == rarityFilter;

return matchesSearch &&
matchesRarity;

});

const ownedCount=
filtered.filter(x=>
ownedMap[x.id]?.owned
).length;

document.getElementById('progress')
.innerHTML=
`Owned ${ownedCount} / ${filtered.length}`;

let html='';

filtered.forEach(p=>{

const owned=
ownedMap[p.id]?.owned || false;

const qty=
ownedMap[p.id]?.quantity || 1;

html+=`

<div class="card">

${p.image_url ? `
<img
src="${p.image_url}"
class="poke-img"
loading="lazy"
alt="${p.pokemon_name}">
` : ''}

<div class="tag">
${p.tag_code || ''}
</div>

<div class="name">
${p.pokemon_name}
</div>

<div class="rarity">
${'⭐'.repeat(p.rarity)}
</div>

<div class="row">

<label>

<input
type="checkbox"
${owned?'checked':''}
onchange="toggleOwned(${p.id},this.checked)">

Owned

</label>

<input
class="qty"
type="number"
min="1"
value="${qty}"
onchange="updateQty(${p.id},this.value)">

</div>

</div>

`;

});

document.getElementById('grid')
.innerHTML=html;

}

async function toggleOwned(pokemonId,owned){

const qty=
ownedMap[pokemonId]?.quantity || 1;

const {error}=await db
.from('user_collection')
.upsert({
user_id:Number(userId),
pokemon_id:pokemonId,
owned:owned,
quantity:qty
});

if(error){
console.error(error);
return;
}

await loadCollection();
renderPokemon();

}

async function updateQty(pokemonId,qty){

const owned=
ownedMap[pokemonId]?.owned || false;

const {error}=await db
.from('user_collection')
.upsert({
user_id:Number(userId),
pokemon_id:pokemonId,
owned:owned,
quantity:Number(qty)
});

if(error){
console.error(error);
return;
}

await loadCollection();

}

</script>

</body>
</html>
