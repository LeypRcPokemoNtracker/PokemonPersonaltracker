<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Collection</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
}

header{
background:#1e293b;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{
padding:20px;
max-width:1400px;
margin:auto;
}

.topbar{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

button{
padding:10px 16px;
border:none;
border-radius:8px;
cursor:pointer;
}

.version-btn{
background:#334155;
color:white;
}

.active{
background:#3b82f6;
}

.search{
padding:10px;
border:none;
border-radius:8px;
width:250px;
}
  #rarityFilter{
padding:10px;
border:none;
border-radius:8px;
background:white;
color:black;
min-width:170px;
}


.progress{
margin-bottom:20px;
font-size:18px;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:15px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:12px;
transition:.3s;
}

/* Owned Pokemon */
.card.owned{

border:1px solid #e879f9;

box-shadow:
0 0 10px #e879f955,
0 0 22px #a855f744;

}
  .card.owned:hover{

transform:translateY(-4px);

box-shadow:
0 0 16px #f472b6aa,
0 0 34px #a855f788;

}
  .card{

transition:
transform .25s,
box-shadow .25s;

}

.card:hover{

transform:
translateY(-4px);

}

 .poke-img{

width:100%;
height:180px;
object-fit:contain;
background:#0f172a;
border-radius:8px;
margin-bottom:10px;
padding:5px;

transition:.35s;

}

.poke-img.locked{

filter:
brightness(0)
contrast(1.5);

opacity:.85;

transform:scale(.98);

}
  .poke-img.locked:hover{

filter:
brightness(.18)
contrast(1.3);

transition:.3s;

}

.tag{
color:#94a3b8;
font-size:13px;
margin-bottom:5px;
}

.name{
font-size:18px;
font-weight:bold;
margin-bottom:8px;
}

.rarity{
margin-bottom:10px;
color:#facc15;
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
}

.qty{
width:70px;
padding:6px;
border:none;
border-radius:6px;
}

  .qty-control{

display:flex;
align-items:center;
justify-content:center;
gap:8px;

background:#0f172a;
border:1px solid #334155;
border-radius:10px;

padding:4px;

}

.qty-btn{

width:30px;
height:30px;

border:none;
border-radius:8px;

background:#334155;
color:white;

font-size:18px;
font-weight:bold;

cursor:pointer;

transition:.2s;

}

.qty-btn:hover{

background:#3b82f6;

}

.qty-value{

min-width:28px;

text-align:center;

font-size:16px;
font-weight:bold;

}
  
.summary-card{

background:#1e293b;

border-radius:16px;

padding:22px;

margin-bottom:25px;

border:1px solid #334155;

}

.summary-title{

font-size:14px;

color:#94a3b8;

text-transform:uppercase;

letter-spacing:2px;

margin-bottom:6px;

}

.summary-total{

font-size:30px;

font-weight:bold;

margin-bottom:18px;

}

.summary-boxes{

display:flex;

gap:18px;

flex-wrap:wrap;

}

.summary-box{

flex:1;

min-width:170px;

background:#0f172a;

border:1px solid #334155;

border-radius:14px;

padding:18px;

cursor:pointer;

transition:.25s;

}

.summary-box:hover{

transform:translateY(-3px);

border-color:#a855f7;

box-shadow:0 0 18px rgba(168,85,247,.35);

}
.summary-box.active{

border-color:#e879f9;

box-shadow:
0 0 18px rgba(236,72,153,.45),
0 0 35px rgba(168,85,247,.35);

transform:translateY(-3px);

}
.summary-label{

font-size:13px;

color:#94a3b8;

text-transform:uppercase;

letter-spacing:1px;

margin-bottom:8px;

}

.summary-number{

font-size:34px;

font-weight:bold;

}
</style>
</head>

<body>

<header>

<h2>Collection</h2>

<button onclick="window.location.href='dashboard.html'">
Home
</button>
  <button onclick="window.location.href='owned.html'">
Movesets
</button>
   <button onclick="window.location.href='battle.html'">
Battle
</button>

</header>

<div class="container">

<div class="topbar">
  <button onclick="openAddPokemon()">
➕ Add Pokémon
</button>
  <button onclick="exportCollection()">
 Export Collection
</button>

  


  
<button class="version-btn" onclick="loadVersion(1,this)">
V1
</button>
  
<button class="version-btn" onclick="loadVersion(2,this)">
V2
</button>

<button class="version-btn" onclick="loadVersion(3,this)">
V3
</button>
  <button class="version-btn" onclick="loadVersion(4,this)">
🌌 Galaxy
</button>
  <button class="version-btn" onclick="loadVersion(5,this)">
Promos
</button>
  <button class="version-btn" onclick="loadVersion(6,this)">
🌍 Others
</button>
  
  <button class="version-btn active" onclick="loadVersion('all',this)"> 
    ALL 
  </button>

<input
type="text"
id="search"
class="search"
placeholder="Search Pokemon..."
onkeyup="renderPokemon()">
<select id="rarityFilter" onchange="renderPokemon()">

<option value="all"> All Rarities </option>

<option value="6">6 Star ⭐⭐⭐⭐⭐⭐</option>

<option value="5">5 Star ⭐⭐⭐⭐⭐</option>
  <option value="1">Specials ✨</option>

<option value="4"> 4 Star ⭐⭐⭐⭐</option>

<option value="3">3 Star  ⭐⭐⭐</option>

<option value="2">2 Star ⭐⭐</option>




</select>
</div>

<div id="collectionSummary" class="summary-card">

<div class="summary-title">
Collection
</div>

<div class="summary-total" id="summaryTotal">
0 / 0
</div>

<div class="summary-boxes">

<div
id="ownedBtn"
class="summary-box"
onclick="loadOwned(this)">

<div class="summary-label">
Owned
</div>

<div class="summary-number" id="ownedCount">
0
</div>

</div>

<div
id="missingBtn"
class="summary-box"
onclick="loadMissing(this)">

<div class="summary-label">
Missing
</div>

<div class="summary-number" id="missingCount">
0
</div>

</div>

</div>

</div>

<div class="grid" id="grid"></div>

</div>

<script>
async function exportCollection(){

const {data,error} = await db
.from('pokemon_master')
.select(`
id,
tag_code,
pokemon_name,
version,
rarity,
user_collection!left(
owned,
quantity,
user_id
)
`);

if(error){
console.error(error);
alert("Export failed.");
return;
}

let csv =
"tag_code,pokemon_name,version,rarity,owned,quantity\n";

data.forEach(p=>{

const record =
(p.user_collection || [])
.find(x=>x.user_id == Number(userId));

const owned =
record ? record.owned : false;

const quantity =
record ? record.quantity : 0;

csv +=
`${p.tag_code},"${p.pokemon_name}",${p.version},${p.rarity},${owned},${quantity}\n`;

});

const blob =
new Blob([csv],{
type:"text/csv;charset=utf-8;"
});

const link =
document.createElement("a");

link.href =
URL.createObjectURL(blob);

link.download =
`Mezastar_Collection_${new Date().toISOString().slice(0,10)}.csv`;

link.click();

URL.revokeObjectURL(link.href);

}
const db = supabase.createClient(
'https://dzbpzlkpjbascrjozcih.supabase.co',
'sb_publishable_AXT6yLPWDsSJ43uf14KMIQ_tlEoOt4r'
);

const userId =
localStorage.getItem('user_id');

if(!userId){
location.href='index.html';
}

let allPokemon=[];
let pokemonList=[];
let ownedMap={};
let currentVersion="all";
let currentView="all";

let editPokemonId=null;

window.addEventListener("load",()=>{

document
.getElementById("addImageFile")
.addEventListener("change",autoFillPokemon);

const allBtn =
document.querySelector(".version-btn.active");

loadVersion("all", allBtn);
});
  

async function loadVersion(version,btn=null){

currentVersion=version;
  currentView="version";

document
.querySelectorAll('.version-btn')
.forEach(x=>x.classList.remove('active'));
  document
.querySelectorAll(".summary-box")
.forEach(x=>x.classList.remove("active"));

if(btn) btn.classList.add('active');

await loadCollection();

const {data,error}=await db
.from("pokemon_master")
.select("*")
.order("version")
.order("rarity",{ascending:false})
.order("tag_code");

if(error){
console.error(error);
return;
}

allPokemon = data;
pokemonList =
version==="all"
? [...allPokemon]
: allPokemon.filter(
p=>p.version==version
);

renderPokemon();
}
  async function loadOwned(btn=null){
currentView="owned";
    document
    .querySelectorAll('.version-btn')
    .forEach(x=>x.classList.remove('active'));
document
.querySelectorAll(".summary-box")
.forEach(x=>x.classList.remove("active"));
   
       if(btn){
    btn.classList.add("active");
}

    await loadCollection();

    const ownedIds =
    Object.keys(ownedMap)
    .filter(id => ownedMap[id].owned)
    .map(id => Number(id));

    if(ownedIds.length === 0){
        pokemonList=[];
        renderPokemon();
        return;
    }
pokemonList =
allPokemon.filter(
p=>ownedMap[p.id]?.owned
);

    renderPokemon();

}

async function loadMissing(btn=null){
currentView="missing";
document
.querySelectorAll(".version-btn")
.forEach(x=>x.classList.remove("active"));
document
.querySelectorAll(".summary-box")
.forEach(x=>x.classList.remove("active"));
if(btn){
btn.classList.add("active");
}

await loadCollection();

pokemonList =
allPokemon.filter(
p=>!ownedMap[p.id]?.owned
);

renderPokemon();

}


async function loadCollection(){

const {data}=await db
.from('user_collection')
.select('*')
.eq('user_id',userId);

ownedMap={};

(data||[]).forEach(x=>{
ownedMap[x.pokemon_id]=x;
});
updateCollectionCounters();
}
function updateCollectionCounters(){

const owned =
Object.values(ownedMap)
.filter(x=>x.owned)
.length;

const total =
allPokemon.length;

document.getElementById("ownedCount").textContent =
owned;

document.getElementById("missingCount").textContent =
Math.max(total-owned,0);

document.getElementById("summaryTotal").textContent =
`${owned} / ${total}`;

}
function renderPokemon(){

const search =
document.getElementById('search')
.value
.toLowerCase();

const rarityFilter =
document.getElementById('rarityFilter')
.value;

const filtered =
pokemonList.filter(p => {

const matchesSearch =
p.pokemon_name
.toLowerCase()
.includes(search);

const matchesRarity =

rarityFilter === 'all'

||

p.rarity == rarityFilter;

return matchesSearch &&
matchesRarity;

});

updateCollectionCounters();

let html='';

filtered.forEach(p=>{

const owned=
ownedMap[p.id]?.owned || false;

const qty=
ownedMap[p.id]?.quantity || 1;

html+=`

<div class="card ${owned ? 'owned' : ''}">

<button
style="
width:100%;
background:#2563eb;
color:white;
margin-bottom:12px;
"
onclick="openEditPokemon(${p.id})">

✏️ Edit Pokémon

</button>

${p.image_url ? `
<img
src="${p.image_url}"
class="poke-img ${owned ? '' : 'locked'}"
loading="lazy"
alt="${p.pokemon_name}">
` : ''}

<div
class="tag"
style="
display:flex;
justify-content:space-between;
align-items:center;
">

<span>
${p.tag_code}
</span>

<span
style="
font-weight:bold;
color:#cbd5e1;
">

${{
1:"V1",
2:"V2",
3:"V3",
4:"Galaxy 🌌",
5:"Promo 🎁",
6:"Others 🌍"
}[p.version]}

</span>

</div>

<div class="name">
${p.pokemon_name}
</div>

<div class="rarity">
${'⭐'.repeat(p.rarity)}
</div>

<div class="row">

<label>

<input
type="checkbox"
${owned?'checked':''}
onchange="toggleOwned(${p.id},this.checked)">

Owned

</label>

${owned ? `

<div class="qty-control">

<button
class="qty-btn"
onclick="changeQty(${p.id},-1)">
−
</button>

<div class="qty-value">
${qty}
</div>

<button
class="qty-btn"
onclick="changeQty(${p.id},1)">
+
</button>

</div>

` : ""}

</div>

<div style="margin-top:12px;">

<button
style="
width:100%;
background:#2563eb;
color:white;
"
onclick="openEditPokemon(${p.id})">

✏️ Edit Pokémon

</button>

</div>

</div>

<div style="margin-top:12px;">

<button
style="
width:100%;
background:#2563eb;
color:white;
"
onclick="openEditPokemon(${p.id})">

✏️ Edit Pokémon

</button>

</div>

</div>

`;

});

document.getElementById('grid')
.innerHTML=html;

}

async function toggleOwned(pokemonId, owned){

if(owned){

const qty =
ownedMap[pokemonId]?.quantity || 1;

const {error} = await db
.from('user_collection')
.upsert({
user_id:Number(userId),
pokemon_id:pokemonId,
owned:true,
quantity:qty
});

if(error){
console.error(error);
return;
}

}else{

const {error} = await db
.from('user_collection')
.delete()
.eq('user_id', Number(userId))
.eq('pokemon_id', pokemonId);

if(error){
console.error(error);
return;
}

}

await loadCollection();

// If currently viewing OWNED, refresh the list
if(currentView==="owned"){

await loadOwned(
document.getElementById("ownedBtn")
);

}
else if(currentView==="missing"){

await loadMissing(
document.getElementById("missingBtn")
);

}
else{

renderPokemon();

}
}
async function changeQty(pokemonId, amount){

const current =
ownedMap[pokemonId]?.quantity || 1;

const newQty =
Math.max(1,current+amount);

await updateQty(
pokemonId,
newQty
);

}
async function updateQty(pokemonId, qty){

if(!ownedMap[pokemonId]?.owned){
return;
}

const {error}=await db
.from('user_collection')
.update({
quantity:Number(qty)
})
.eq('user_id', Number(userId))
.eq('pokemon_id', pokemonId);

if(error){
console.error(error);
return;
}

await loadCollection();

if(currentView==="owned"){

await loadOwned(
document.getElementById("ownedBtn")
);

}
else if(currentView==="missing"){

await loadMissing(
document.getElementById("missingBtn")
);

}
else{

renderPokemon();

}
}
// ← updateQty ENDS HERE
function openEditPokemon(id){

editPokemonId=id;

const p=
allPokemon.find(x=>x.id==id);

document.getElementById("pokemonModalTitle").innerHTML=
"Edit Pokémon";

document.getElementById("addCollection").value=
p.version;

document.getElementById("addTagCode").value=
p.tag_code;

document.getElementById("addPokemonName").value=
p.pokemon_name;

document.getElementById("addRarity").value=
p.rarity;

document.getElementById("addImage").value=
p.image_url||"";

document.getElementById("markOwned").checked=
ownedMap[id]?.owned||false;

document.getElementById("pokemonModal").style.display="flex";

}
function openAddPokemon(){

editPokemonId=null;

document.getElementById("pokemonModalTitle").innerHTML=
"Add Pokémon";

document.getElementById("addCollection").value=1;

document.getElementById("addTagCode").value="";

document.getElementById("addPokemonName").value="";

document.getElementById("addImage").value="";

document.getElementById("addImageFile").value="";

document.getElementById("addRarity").value=6;

document.getElementById("markOwned").checked=false;

document.getElementById("pokemonModal").style.display="flex";

}

function closeAddPokemon(){

document.getElementById("pokemonModal").style.display="none";

}

  async function autoFillPokemon(e){

const file=e.target.files[0];

if(!file) return;

const filename=file.name.replace(/\.[^/.]+$/,"");

const parts=filename.split("_");

if(parts.length>=2){

document.getElementById("addTagCode").value=parts[0];

document.getElementById("addPokemonName").value=
parts.slice(1).join(" ");

}

}
async function savePokemon(){

const version =
Number(document.getElementById("addCollection").value);

const tag =
document.getElementById("addTagCode").value.trim();

const name =
document.getElementById("addPokemonName").value.trim();

const rarity =
Number(document.getElementById("addRarity").value);

let image=
document.getElementById("addImage").value.trim();

const file=
document.getElementById("addImageFile").files[0];

if(!tag || !name){

alert("Tag Code and Pokémon Name are required.");

return;

}

  const {
data:existing,
error:checkError
}=await db
.from("pokemon_master")
.select("id")
.eq("tag_code",tag)
.maybeSingle();

if(checkError){

alert(checkError.message);

return;

}

if(existing && existing.id!=editPokemonId){

alert("This Tag Code already exists.");

return;

}
if(file){

const ext=file.name.split(".").pop().toLowerCase();

const fileName=
`${tag}_${name}.${ext}`;
console.log(fileName);

const upload=await db.storage
.from("pokemon-images")
.upload(fileName,file,{upsert:true});

if(upload.error){

alert(JSON.stringify(upload.error, null, 2));

return;

}

image=db.storage
.from("pokemon-images")
.getPublicUrl(fileName)
.data.publicUrl;

}
let data,error;

if(editPokemonId){

({data,error}=await db

.from("pokemon_master")

.update({

tag_code:tag,

pokemon_name:name,

version:version,

rarity:rarity,

image_url:image || null

})

.eq("id",editPokemonId)

.select()

.single());

}else{

({data,error}=await db

.from("pokemon_master")

.insert({

tag_code:tag,

pokemon_name:name,

version:version,

rarity:rarity,

image_url:image || null

})

.select()

.single());

}

if(error){

console.error(error);

alert(JSON.stringify(error, null, 2));

return;

}
if(document.getElementById("markOwned").checked){

await db
.from("user_collection")
.insert({

user_id:Number(userId),

pokemon_id:data.id,

owned:true,

quantity:1

});
await loadCollection();
}
alert(

editPokemonId

?

"Pokémon updated successfully!"

:

"Pokémon added successfully!"

);

closeAddPokemon();

document.getElementById("addTagCode").value="";
document.getElementById("addPokemonName").value="";
document.getElementById("addImage").value="";
document.getElementById("addImageFile").value="";
document.getElementById("markOwned").checked=false;

document.getElementById("addRarity").value=6;
document.getElementById("addCollection").value=1;
editPokemonId=null;

document.getElementById("pokemonModalTitle").innerHTML=
"Add Pokémon";
// Refresh current view

if(currentView==="owned"){

loadOwned(
document.getElementById("ownedBtn")
);

}
else if(currentView==="missing"){

loadMissing(
document.getElementById("missingBtn")
);

}
else{

loadVersion(
currentVersion,
document.querySelector(".version-btn.active")
);

}

}

</script>
<div
id="pokemonModal"
style="
display:none;
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,.75);
justify-content:center;
align-items:center;
z-index:9999;
">

<div
style="
background:#1e293b;
padding:25px;
border-radius:12px;
width:95%;
max-width:700px;
max-height:90%;
overflow:auto;
">

<h2 id="pokemonModalTitle">

Add Pokémon

</h2>
<br>

<label>Collection *</label>

<select
id="addCollection"
style="width:100%;padding:10px;margin-bottom:15px;">

<option value="1">V1</option>
<option value="2">V2</option>
<option value="3">V3</option>
<option value="4">🌌 Galaxy</option>
<option value="5">🎁 Promo</option>
  <option value="6">🌍 Others</option>

</select>

<label>Tag Code *</label>

<input
id="addTagCode"
style="width:100%;padding:10px;margin-bottom:15px;">

<label>Pokémon Name *</label>

<input
id="addPokemonName"
style="width:100%;padding:10px;margin-bottom:15px;">

<label>Pokémon Image (Optional)</label>

<input
type="file"
id="addImageFile"
accept="image/*"
style="width:100%;padding:10px;margin-bottom:15px;">

<br><br>

<label>Or Image URL (Optional)</label>

<input
id="addImage"
placeholder="https://..."
style="width:100%;padding:10px;margin-bottom:15px;">

<label>Rarity</label>

<select
id="addRarity"
style="width:100%;padding:10px;margin-bottom:15px;">

<option value="6">⭐⭐⭐⭐⭐⭐</option>
<option value="5">⭐⭐⭐⭐⭐</option>
<option value="4">⭐⭐⭐⭐</option>
<option value="3">⭐⭐⭐</option>
<option value="2">⭐⭐</option>
<option value="1">✨ Special</option>

</select>

<label
style="
display:flex;
align-items:center;
gap:10px;
margin-bottom:20px;
">

<input
type="checkbox"
id="markOwned">

Mark as Owned immediately

</label>

<div
style="
display:flex;
justify-content:flex-end;
gap:10px;
">

<button
onclick="closeAddPokemon()">
Cancel
</button>

<button
onclick="savePokemon()">
Save Pokémon
</button>

</div>

</div>

</div>
</body>
</html>
